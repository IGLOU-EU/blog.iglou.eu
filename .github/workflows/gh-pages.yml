name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  announce:
    runs-on: ubuntu-latest
    container: golang:latest
    environment:
      name: announce
    permissions:
      contents: write
    env:
      ANNOUNCE_DIR: ${{ vars.ANNOUNCE_DIR }}
      MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
      MASTODON_INSTANCE: ${{ vars.MASTODON_INSTANCE }}
      STATUS_VISIBILITY: ${{ vars.STATUS_VISIBILITY }}
      STATUS_TEMPLATE: ${{ vars.STATUS_TEMPLATE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Check required variables
        run: |
          for v in MASTODON_TOKEN MASTODON_INSTANCE; do
            eval "val=\$$v"
            [ -n "$val" ] || { echo "announce: required variable $v is unset"; exit 1; }
          done

      - name: Announce
        env:
          # Resolved from the module directory, so pin it to the checkout.
          SITE_ROOT: ${{ github.workspace }}
        run: |
          ANNOUNCE_DIR="${ANNOUNCE_DIR:-$(dirname "$(grep -rl --include=go.mod 'iglou-eu/statiquepouet-hugo' "$SITE_ROOT" | head -n1)")}"
          [ -f "$ANNOUNCE_DIR/go.mod" ] || { echo "announce: could not locate the announce module under $SITE_ROOT (set vars.ANNOUNCE_DIR to override)"; exit 1; }
          echo "announce: using module at $ANNOUNCE_DIR"
          cd "$ANNOUNCE_DIR"
          go mod tidy
          go run .

      - name: Commit and push front-matter changes
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.email "actions@github.com"
          git config user.name "StatiquePouet announce bot"
          if git diff --quiet -- content; then
            echo "announce: no front-matter changes to commit"
          else
            git add content
            git commit -m "chore: announce articles to Mastodon"
            git push
          fi

  build:
    needs: announce
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    env:
      DART_SASS_VERSION: 1.99.0
      TZ: Europe/Paris
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Check out the branch tip rather than the triggering SHA so we pick up
          # the front-matter commit pushed by the announce job above.
          ref: ${{ github.ref_name }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          mkdir -p "${HOME}/.local"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Install Hugo (latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HUGO_VERSION="$(gh api repos/gohugoio/hugo/releases/latest --jq .tag_name | sed 's/^v//')"
          echo "Installing Hugo ${HUGO_VERSION}"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Hugo: $(hugo version)"

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: hugo-

      - name: Build the site
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Cache save
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
